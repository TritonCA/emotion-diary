name: mood_tracker
description: Minimalist mood & emotion tracker. Feature-first MVVM architecture.
publish_to: 'none'
version: 1.4.2+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
  get_it: ^7.7.0
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  google_fonts: ^6.2.1
  csv: ^6.0.0
  share_plus: ^9.0.0
  file_picker: ^8.0.7
  path_provider: ^2.1.4
  package_info_plus: ^8.0.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
