name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: ubuntu-22.04
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: macos
            arch: universal
          - os: ubuntu-22.04
            platform: android
            arch: arm64
          - os: ubuntu-22.04
            platform: android
            arch: arm32
          - os: ubuntu-22.04
            platform: android
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Enable desktop
        if: matrix.platform != 'android'
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Restore Android release keystore
        if: matrix.platform == 'android'
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "ANDROID_KEYSTORE_B64 secret not set — falling back to debug signing."
            echo "WARNING: debug-signed APKs from CI cannot upgrade an existing install (signature mismatch)."
            exit 0
          fi
          printf '%s' "${KEYSTORE_B64}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: flutter build linux --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: flutter build macos --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (Android arm64)
        if: matrix.platform == 'android' && matrix.arch == 'arm64'
        run: flutter build apk --release --target-platform android-arm64 --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (Android arm32)
        if: matrix.platform == 'android' && matrix.arch == 'arm32'
        run: flutter build apk --release --target-platform android-arm --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Build (Android x86_64)
        if: matrix.platform == 'android' && matrix.arch == 'x86_64'
        run: flutter build apk --release --target-platform android-x64 --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $releaseDir = Get-Item "build\windows\*\runner\Release" | Select-Object -First 1 -ExpandProperty FullName
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "mood-tracker-$env:GITHUB_REF_NAME-windows-${{ matrix.arch }}.zip"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd build/linux/*/release/bundle
          zip -r "$GITHUB_WORKSPACE/mood-tracker-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.zip" .

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/mood-tracker-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}.zip" *.app

      - name: Package (Android)
        if: matrix.platform == 'android'
        shell: bash
        run: cp build/app/outputs/flutter-apk/app-release.apk "mood-tracker-${GITHUB_REF_NAME}-android-${{ matrix.arch }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood-tracker-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            mood-tracker-*.zip
            mood-tracker-*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mood-tracker-*.zip
            mood-tracker-*.apk
          generate_release_notes: true
