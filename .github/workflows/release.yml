name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Restore Android release keystore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "ANDROID_KEYSTORE_B64 secret not set — falling back to debug signing."
            echo "WARNING: debug-signed APKs from CI cannot upgrade an existing install (signature mismatch)."
            exit 0
          fi
          printf '%s' "${KEYSTORE_B64}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build APK (arm64)
        run: flutter build apk --release --target-platform android-arm64 --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Package APK
        shell: bash
        run: cp build/app/outputs/flutter-apk/app-release.apk "mood-tracker-${GITHUB_REF_NAME}-android-arm64.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood-tracker-${{ github.ref_name }}-android-arm64
          path: mood-tracker-*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mood-tracker-*.apk
          generate_release_notes: true
